<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordeno x Vos · Presupuestos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
/* ── Reset & Tokens ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --g:       #0F6E56;
  --gm:      #1a9470;
  --gl:      #E4F7F0;
  --gll:     #f0faf6;
  --gd:      #085041;
  --accent:  #EF9F27;
  --red:     #E24B4A;
  --bg:      #F4F6F5;
  --surface: #FFFFFF;
  --border:  #E2E9E6;
  --text1:   #111C19;
  --text2:   #5A7269;
  --text3:   #9BB0AA;
  --radius:  14px;
  --radius-sm: 8px;
  --shadow:  0 1px 3px rgba(15,110,86,.07), 0 4px 16px rgba(15,110,86,.06);
  --shadow-sm: 0 1px 2px rgba(15,110,86,.06);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --max-w: 520px;
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text1);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.app-shell {
  width: 100%;
  max-width: var(--max-w);
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  position: relative;
}

/* ── Header ───────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 13px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 11px;
  background: linear-gradient(145deg, var(--gm), var(--g));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(15,110,86,.25);
}
.logo i { color: #fff; font-size: 20px; }

.hd { flex: 1; min-width: 0; }
.hd-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text1);
  letter-spacing: -.01em;
}
.hd-sub {
  font-size: 11.5px;
  color: var(--text2);
  margin-top: 1px;
}

.num-pill {
  background: var(--gl);
  color: var(--gd);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: .01em;
  flex-shrink: 0;
  border: 1px solid rgba(15,110,86,.12);
}

/* ── Nav Tabs ─────────────────────────────────────────── */
.nav-wrapper {
  padding: 12px 14px 6px;
  background: var(--bg);
  position: sticky;
  top: 69px;
  z-index: 40;
}

.nav {
  display: flex;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  gap: 3px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

.nav-btn {
  flex: 1;
  border: none;
  background: none;
  border-radius: 10px;
  padding: 9px 6px 8px;
  font-size: 11px;
  font-family: var(--font);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all .18s ease;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn i { font-size: 18px; transition: transform .18s ease; }
.nav-btn.active {
  background: var(--g);
  color: #fff;
  box-shadow: 0 2px 8px rgba(15,110,86,.28);
}
.nav-btn.active i { transform: scale(1.05); }
.nav-btn:not(.active):hover { background: var(--gll); color: var(--g); }

/* ── Panels ───────────────────────────────────────────── */
.panel { display: none; padding: 10px 14px 100px; }
.panel.active { display: block; }

/* ── Cards ────────────────────────────────────────────── */
.scard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}

.slabel {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 12px;
}

/* ── Form Controls ────────────────────────────────────── */
label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 5px;
  margin-top: 12px;
}
label:first-of-type { margin-top: 4px; }

input, select, textarea {
  width: 100%;
  font-size: 14px;
  font-family: var(--font);
  padding: 9px 11px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text1);
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--g);
  box-shadow: 0 0 0 3px rgba(15,110,86,.1);
}
input::placeholder, textarea::placeholder { color: var(--text3); }
textarea {
  resize: vertical;
  font-family: var(--font);
  font-size: 13px;
  min-height: 60px;
  line-height: 1.5;
}
select {
  /* iOS Safari necesita -webkit-appearance: none pero SIN background-image custom
     para que el picker nativo del sistema funcione correctamente */
  -webkit-appearance: menulist-button;
  appearance: auto;
  background-image: none;
  cursor: pointer;
  /* Asegurar que sea tappable en toda su área */
  position: relative;
  z-index: 1;
}

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Autocomplete ─────────────────────────────────────── */
.autocomplete-wrap { position: relative; }
.ac-list {
  position: absolute;
  left: 0; right: 0;
  background: var(--surface);
  border: 1.5px solid var(--g);
  border-radius: var(--radius-sm);
  margin-top: 4px;
  max-height: 180px;
  overflow-y: auto;
  display: none;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(15,110,86,.15);
}
.ac-item {
  padding: 10px 13px;
  font-size: 13.5px;
  cursor: pointer;
  color: var(--text1);
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.ac-item:hover { background: var(--gll); color: var(--g); }
.ac-item:last-child { border-bottom: none; }

/* ── Items Header ─────────────────────────────────────── */
.items-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.btn-add-item {
  background: var(--g);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 12.5px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-add-item:hover { background: var(--gm); }
.btn-add-item:active { transform: scale(.97); }

/* ── Item Card ────────────────────────────────────────── */
.item-card {
  background: var(--gll);
  border-radius: var(--radius-sm);
  padding: 11px;
  margin-bottom: 8px;
  border: 1.5px solid var(--gl);
  transition: border-color .15s;
  position: relative;
  z-index: 1;
  /* iOS: nunca cortar el área de tap del select */
  overflow: visible;
}
.item-card select {
  font-size: 16px; /* iOS no hace zoom si font-size >= 16px */
  margin-bottom: 9px;
  background-color: var(--surface);
  width: 100%;
  min-height: 44px; /* área mínima de tap recomendada por Apple HIG */
  padding: 8px 11px;
}

.item-footer {
  display: flex;
  gap: 8px;
  align-items: center;
}

.qty-wrap {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--surface);
  flex-shrink: 0;
}
.qty-btn {
  border: none;
  background: none;
  padding: 0 12px;
  height: 36px;
  font-size: 17px;
  cursor: pointer;
  color: var(--g);
  font-weight: 500;
  transition: background .1s;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn:hover { background: var(--gll); }
.qty-btn:active { background: var(--gl); }
.qty-val {
  font-size: 14px;
  font-weight: 600;
  font-family: var(--mono);
  min-width: 28px;
  text-align: center;
  color: var(--text1);
  pointer-events: none;
}

.item-sub {
  flex: 1;
  text-align: right;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--g);
  font-family: var(--mono);
}

.btn-del {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
  border-radius: 6px;
  transition: color .15s, background .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-del:hover { color: var(--red); background: #fef2f2; }

/* ── Total Block ──────────────────────────────────────── */
.total-block {
  background: linear-gradient(135deg, var(--g) 0%, var(--gm) 100%);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin: 14px 0 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(15,110,86,.3);
}
.total-lbl {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 4px;
}
.total-amt {
  font-size: 24px;
  font-weight: 600;
  color: #fff;
  font-family: var(--mono);
  letter-spacing: -.01em;
}

/* ── Action Buttons ───────────────────────────────────── */
.btn-pdf {
  width: 100%;
  background: var(--surface);
  color: var(--g);
  border: 2px solid var(--g);
  border-radius: var(--radius);
  padding: 13px;
  font-size: 14px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-pdf:hover { background: var(--gll); }
.btn-pdf:active { transform: scale(.98); }

.btn-wa {
  width: 100%;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 13px;
  font-size: 14px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 2px 12px rgba(37,211,102,.3);
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-wa:hover { background: #20c05c; }
.btn-wa:active { transform: scale(.98); }

/* ── Historial Cards ──────────────────────────────────── */
.hist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 15px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: box-shadow .15s, transform .15s;
}
.hist-card:hover { box-shadow: 0 4px 20px rgba(15,110,86,.1); }

.hist-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.hist-num {
  background: var(--gl);
  color: var(--gd);
  border-radius: 20px;
  padding: 3px 11px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  border: 1px solid rgba(15,110,86,.12);
}
.hist-date {
  font-size: 11.5px;
  color: var(--text3);
}

.hist-client {
  font-size: 15.5px;
  font-weight: 600;
  color: var(--text1);
  margin-bottom: 10px;
  letter-spacing: -.01em;
}

.hist-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.hist-items {
  font-size: 12px;
  color: var(--text2);
}
.hist-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hist-total {
  font-size: 15px;
  font-weight: 600;
  color: var(--g);
  font-family: var(--mono);
}
.btn-edit-hist {
  background: var(--gll);
  color: var(--gd);
  border: 1px solid var(--gl);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-edit-hist:hover { background: var(--gl); }

/* ── Catálogo ─────────────────────────────────────────── */
.catalog-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.catalog-row:last-of-type { border-bottom: none; }

.cat-name-input {
  font-size: 13px;
  padding: 6px 8px;
  width: 100%;
  margin-bottom: 2px;
  border-radius: 6px;
}
.cat-cod {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  display: block;
  margin-top: 2px;
}
.price-inp {
  width: 96px;
  font-size: 13px;
  text-align: right;
  padding: 6px 8px;
  font-family: var(--mono);
  border-radius: 6px;
  flex-shrink: 0;
}

.btn-outline {
  width: 100%;
  margin-top: 12px;
  background: transparent;
  color: var(--g);
  border: 1.5px solid var(--g);
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 13px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-outline:hover { background: var(--gll); }

.new-item-form {
  background: var(--gll);
  border: 1.5px solid var(--gl);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-top: 10px;
  display: none;
}

/* ── Toast ────────────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  pointer-events: none;
  width: calc(100% - 28px);
  max-width: calc(var(--max-w) - 28px);
}
.toast {
  background: var(--text1);
  color: #fff;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 13.5px;
  font-weight: 500;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  text-align: center;
  transform: translateY(8px);
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Editing Banner ───────────────────────────────────── */
.editing-banner {
  background: #FFFBEB;
  border: 1.5px solid #FDE68A;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 10px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.editing-banner span { font-size: 12.5px; color: #92400E; font-weight: 500; }
.btn-cancel-edit {
  background: none;
  border: 1px solid #D97706;
  color: #92400E;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}

/* ── Misc ─────────────────────────────────────────────── */
.empty {
  color: var(--text3);
  font-size: 13px;
  padding: 32px 0;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.empty i { font-size: 36px; opacity: .4; }

.reset-btn {
  padding: 0 10px;
  height: 40px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: none;
  cursor: pointer;
  color: var(--text2);
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.reset-btn:hover { background: var(--gll); color: var(--g); }

/* ── Desktop padding ──────────────────────────────────── */
@media (min-width: 521px) {
  body { padding: 24px 0; background: #E8EDEB; }
  .app-shell {
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.14);
    min-height: calc(100dvh - 48px);
    max-height: calc(100dvh - 48px);
    overflow-y: auto;
  }
  .header { border-radius: 0; }
}

/* ── Accessibility ────────────────────────────────────── */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

/* ── Section divider ──────────────────────────────────── */
.section-group {
  display: flex;
  flex-direction: column;
  gap: 0;
}
</style>
</head>

<body>
<div class="app-shell">

<h2 class="sr-only">App de presupuestos Ordeno x Vos</h2>

<div class="header">
  <div class="logo"><i class="ti ti-box" aria-hidden="true"></i></div>
  <div class="hd">
    <div class="hd-name">Ordeno x Vos</div>
    <div class="hd-sub">Diego Anon</div>
  </div>
  <div class="num-pill">N° <span id="num-badge">…</span></div>
</div>

<div class="nav-wrapper">
  <div class="nav">
    <button class="nav-btn active" id="nb-nuevo" onclick="showTab('nuevo',this)">
      <i class="ti ti-file-plus" aria-hidden="true"></i>Nuevo
    </button>
    <button class="nav-btn" id="nb-items" onclick="showTab('items',this)">
      <i class="ti ti-package" aria-hidden="true"></i>Ítems
    </button>
    <button class="nav-btn" id="nb-historial" onclick="showTab('historial',this)">
      <i class="ti ti-history" aria-hidden="true"></i>Historial
    </button>
  </div>
</div>

<!-- ── Tab Nuevo ── -->
<div id="tab-nuevo" class="panel active">

  <div class="editing-banner" id="editing-banner">
    <span><i class="ti ti-pencil" style="font-size:13px;vertical-align:-1px" aria-hidden="true"></i> Editando presupuesto <strong id="editing-num-label"></strong></span>
    <button class="btn-cancel-edit" onclick="cancelEdit()">Cancelar</button>
  </div>

  <!-- Cliente -->
  <div class="scard">
    <div class="slabel">Cliente</div>
    <div class="autocomplete-wrap">
      <input type="text" id="inp-cliente" placeholder="Escribí el nombre del cliente…" autocomplete="off"
        oninput="onClienteInput(this.value)" onblur="setTimeout(()=>closeAc(),200)">
      <div class="ac-list" id="ac-list"></div>
    </div>
  </div>

  <!-- Datos -->
  <div class="scard">
    <div class="slabel">Datos del presupuesto</div>
    <div class="row2">
      <div>
        <label>N° presupuesto</label>
        <div style="display:flex;gap:7px">
          <input type="number" id="num-ppto" style="flex:1" onchange="saveNum(this.value)">
          <button class="reset-btn" onclick="resetNum()" title="Resetear número"><i class="ti ti-refresh" aria-hidden="true"></i></button>
        </div>
      </div>
      <div>
        <label>Fecha</label>
        <input type="date" id="fecha-ppto">
      </div>
    </div>
    <label>Observaciones</label>
    <textarea id="obs-ppto" placeholder="Notas para el cliente…"></textarea>
  </div>

  <!-- Ítems -->
  <div class="scard">
    <div class="items-hdr">
      <div class="slabel" style="margin:0">Productos / servicios</div>
      <button class="btn-add-item" onclick="addItem()"><i class="ti ti-plus" aria-hidden="true"></i> Ítem</button>
    </div>
    <div id="items-list"></div>

    <div class="total-block">
      <div>
        <div class="total-lbl">Total</div>
        <div class="total-amt" id="total-display">ARS 0</div>
      </div>
      <i class="ti ti-receipt" style="font-size:28px;color:rgba(255,255,255,.5)" aria-hidden="true"></i>
    </div>

    <button class="btn-pdf" onclick="generarPDF()">
      <i class="ti ti-file-invoice" aria-hidden="true"></i>
      <span id="btn-pdf-label">Generar PDF</span>
    </button>
    <button class="btn-wa" onclick="compartirWA()">
      <i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Compartir por WhatsApp
    </button>
  </div>
</div>

<!-- ── Tab Ítems ── -->
<div id="tab-items" class="panel">
  <div class="scard">
    <div class="slabel">Catálogo</div>
    <input style="margin-bottom:12px;font-size:13px" type="text" placeholder="Buscar ítem…" oninput="renderCatalog(this.value)">
    <div id="items-catalog"></div>
    <button class="btn-outline" onclick="toggleNewItemForm()"><i class="ti ti-plus" aria-hidden="true"></i> Agregar ítem</button>
    <div class="new-item-form" id="new-item-form">
      <label>Descripción</label>
      <input type="text" id="new-desc" placeholder="Nombre del producto o servicio">
      <label>Precio (ARS)</label>
      <input type="number" id="new-precio" placeholder="0">
      <button class="btn-add-item" style="margin-top:12px;width:100%;justify-content:center" onclick="agregarNuevoItem()">
        <i class="ti ti-check" aria-hidden="true"></i> Guardar
      </button>
    </div>
  </div>
</div>

<!-- ── Tab Historial ── -->
<div id="tab-historial" class="panel">
  <div id="historial-list">
    <div class="empty">
      <i class="ti ti-clock-off"></i>
      Todavía no generaste presupuestos.
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap">
  <div class="toast" id="toast"></div>
</div>

</div><!-- /app-shell -->

<script>
const STORAGE_KEY='ovx_num_ppto2';
const DEFAULT_NUM=3453;

// ── Storage seguro: funciona en claude.ai Y en archivo local iOS ──
const store = {
  async get(key) {
    try {
      if (window.storage && typeof window.storage.get === 'function') {
        return await window.storage.get(key);
      }
    } catch(e) {}
    try {
      const v = localStorage.getItem(key);
      if (v !== null) return { value: v };
    } catch(e) {}
    return null;
  },
  async set(key, val) {
    try {
      if (window.storage && typeof window.storage.set === 'function') {
        return await window.storage.set(key, val);
      }
    } catch(e) {}
    try { localStorage.setItem(key, val); } catch(e) {}
  }
};

let CLIENTES_GUARDADOS=[
  'Guillermina','Luli Collazos','Maru','Nicole','Adri Vicente lopez','Lore',
  'Agus Belg','Tessie','Sabri V urquiza','Bren','Karin','Felipe Escribana',
  'Paola N','Jen Monte Castro','Lucía','Nati','Cecilia','Rosana',
  'Magui Palermo','Amira','Natali','Brenda','Vane belgrano','Facu',
  'Marisol Belgrano','Martin','Yelitza Pilara','Aldana 1','Ayelen',
  'Juliana','Milagros','lili Dahab','Delfina Santa barbara','Paula','Laura Abril',
  'Erica','Ana','Pau Caballito','Milagros B','Agust Martinez','Josefina Victoria',
  'Julia Caballito','Olga Plaza Italia','Mer Estancias','Fernando Devoto',
  'Vale San Fernando','Caro Caballito','Ampi recoleta','Eli'
];

let ITEMS=[
  {cod:'IT00001',desc:'Ayudante',precio:65000},
  {cod:'IT00002',desc:'Caja her transp',precio:72000},
  {cod:'IT00003',desc:'Caja zapatos ch',precio:7},
  {cod:'IT00004',desc:'Caja zapatos gr',precio:8},
  {cod:'IT00005',desc:'Cajas de embalaje',precio:100000},
  {cod:'IT00006',desc:'Cajas para zapatos',precio:60000},
  {cod:'IT00007',desc:'Canasto chico',precio:48000},
  {cod:'IT00008',desc:'Canasto lavadero',precio:8000},
  {cod:'IT00009',desc:'Canasto limpieza',precio:9000},
  {cod:'IT00010',desc:'Canasto para juguete',precio:120000},
  {cod:'IT00011',desc:'Canasto ratan blanco c tapa',precio:64000},
  {cod:'IT00012',desc:'Cartón corrugado (rollo)',precio:20000},
  {cod:'IT00013',desc:'Contenedor chico',precio:54000},
  {cod:'IT00014',desc:'Contenedor chico con tapa',precio:52000},
  {cod:'IT00015',desc:'Contenedor grande',precio:48000},
  {cod:'IT00016',desc:'Contenedor grande con tapa',precio:60000},
  {cod:'IT00017',desc:'Contenedor transp grande',precio:36000},
  {cod:'IT00018',desc:'Contenedor transp mediano',precio:56000},
  {cod:'IT00019',desc:'Contenedores interior de cajón',precio:18000},
  {cod:'IT00020',desc:'Servicio especial',precio:360000},
  {cod:'IT00021',desc:'Organizadores de cajón',precio:18000},
  {cod:'IT00022',desc:'Organizadores de zapatos',precio:90000},
  {cod:'IT00023',desc:'Perchas',precio:130000},
  {cod:'IT00024',desc:'Rollo plástico Burbujas Pluribol',precio:20000},
  {cod:'IT00025',desc:'Servicio de organización por hora',precio:240000}
];

let historial=[];
let nextCod=26;
let editingIndex=null;

function fmt(n){return'ARS '+Math.round(n).toLocaleString('es-AR')}

async function loadNum(){
  let num=DEFAULT_NUM;
  try{const r=await store.get(STORAGE_KEY);if(r&&r.value)num=parseInt(r.value);}catch(e){}
  document.getElementById('num-ppto').value=num;
  document.getElementById('num-badge').textContent=num;
}
async function saveNum(val){
  const n=parseInt(val)||DEFAULT_NUM;
  try{await store.set(STORAGE_KEY,String(n));}catch(e){}
  document.getElementById('num-badge').textContent=n;
}
async function resetNum(){
  if(!confirm('¿Resetear al número inicial ('+DEFAULT_NUM+')?'))return;
  document.getElementById('num-ppto').value=DEFAULT_NUM;
  await saveNum(DEFAULT_NUM);showToast('Número reseteado');
}

function onClienteInput(val){
  const q=val.toLowerCase().trim();
  const list=document.getElementById('ac-list');
  if(!q){list.style.display='none';return;}
  const matches=CLIENTES_GUARDADOS.filter(c=>c.toLowerCase().includes(q)).slice(0,6);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map(c=>`<div class="ac-item" onmousedown="selectCliente('${c.replace(/'/g,"\\'")}')">${c}</div>`).join('');
  list.style.display='block';
}
function selectCliente(nombre){
  document.getElementById('inp-cliente').value=nombre;
  closeAc();
}
function closeAc(){document.getElementById('ac-list').style.display='none';}

function showTab(t,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
  if(t==='items')renderCatalog('');
  if(t==='historial')renderHistorial();
}

function buildOpts(){
  return ITEMS.map(i=>`<option value="${i.precio}" data-desc="${i.desc}">${i.desc}</option>`).join('');
}
function refreshItemSelects(){
  document.querySelectorAll('.item-card select').forEach(sel=>{
    const cur=sel.options[sel.selectedIndex]?.dataset?.desc||'';
    sel.innerHTML='<option value="">— Seleccioná ítem —</option>'+buildOpts();
    const m=Array.from(sel.options).find(o=>o.dataset.desc===cur);
    if(m)sel.value=m.value;
  });calcTotal();
}

function addItem(preDesc,preQty){
  const id='itm-'+Date.now()+Math.random().toString(36).slice(2,5);
  const div=document.createElement('div');
  div.className='item-card';div.id=id;
  div.innerHTML=`
    <select onchange="onItemSelect(this,'${id}')">
      <option value="">— Seleccioná ítem —</option>${buildOpts()}
    </select>
    <div class="item-footer">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
        <span class="qty-val" id="qty-${id}">1</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
      </div>
      <span class="item-sub" id="sub-${id}">ARS 0</span>
      <button class="btn-del" onclick="removeItem('${id}')" title="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  document.getElementById('items-list').appendChild(div);
  if(preDesc){
    const sel=div.querySelector('select');
    const opt=Array.from(sel.options).find(o=>o.dataset.desc===preDesc);
    if(opt){
      sel.value=opt.value;
      const qty=preQty||1;
      document.getElementById('qty-'+id).textContent=qty;
      document.getElementById('sub-'+id).textContent=fmt((parseInt(opt.value)||0)*qty);
    }
  }
}
function onItemSelect(sel,id){
  const price=parseInt(sel.value)||0;
  const qty=parseInt(document.getElementById('qty-'+id).textContent)||1;
  document.getElementById('sub-'+id).textContent=fmt(price*qty);
  calcTotal();
}
function changeQty(id,delta){
  const el=document.getElementById('qty-'+id);
  const q=Math.max(1,(parseInt(el.textContent)||1)+delta);
  el.textContent=q;
  const row=document.getElementById(id);
  const sel=row.querySelector('select');
  document.getElementById('sub-'+id).textContent=fmt((parseInt(sel.value)||0)*q);
  calcTotal();
}
function removeItem(id){document.getElementById(id).remove();calcTotal();}
function calcTotal(){
  let total=0;
  document.querySelectorAll('.item-card').forEach(row=>{
    const sel=row.querySelector('select');
    const qty=parseInt(row.querySelector('.qty-val').textContent)||1;
    total+=(parseInt(sel.value)||0)*qty;
  });
  document.getElementById('total-display').textContent=fmt(total);
  return total;
}
function getLineas(){
  const lineas=[];
  document.querySelectorAll('.item-card').forEach(row=>{
    const sel=row.querySelector('select');if(!sel.value)return;
    const qty=parseInt(row.querySelector('.qty-val').textContent)||1;
    const price=parseInt(sel.value)||0;
    lineas.push({desc:sel.options[sel.selectedIndex].dataset.desc,qty,price,total:price*qty});
  });return lineas;
}

function clearForm(){
  document.getElementById('inp-cliente').value='';
  document.getElementById('obs-ppto').value='';
  document.getElementById('items-list').innerHTML='';
  document.getElementById('fecha-ppto').value=new Date().toISOString().split('T')[0];
  calcTotal();
  addItem();
}

function editPresupuesto(idx){
  const h=historial[idx];
  editingIndex=idx;
  document.getElementById('inp-cliente').value=h.cliente;
  document.getElementById('num-ppto').value=h.num;
  document.getElementById('fecha-ppto').value=h.fecha;
  document.getElementById('obs-ppto').value=h.obs||'';
  document.getElementById('items-list').innerHTML='';
  h.lineas.forEach(l=>addItem(l.desc,l.qty));
  calcTotal();
  const banner=document.getElementById('editing-banner');
  banner.style.display='flex';
  document.getElementById('editing-num-label').textContent='N° '+h.num;
  document.getElementById('btn-pdf-label').textContent='Actualizar PDF';
  showTab('nuevo',document.getElementById('nb-nuevo'));
  showToast('Editando presupuesto N° '+h.num);
}

function cancelEdit(){
  editingIndex=null;
  document.getElementById('editing-banner').style.display='none';
  document.getElementById('btn-pdf-label').textContent='Generar PDF';
  clearForm();
  loadNum();
}

async function generarPDF(){
  const cliente=document.getElementById('inp-cliente').value.trim();
  const num=document.getElementById('num-ppto').value;
  const fecha=document.getElementById('fecha-ppto').value;
  const obs=document.getElementById('obs-ppto').value;
  const lineas=getLineas();const total=calcTotal();
  if(!cliente){alert('Escribí el nombre del cliente');return;}
  if(!lineas.length){alert('Agregá al menos un ítem');return;}

  if(!CLIENTES_GUARDADOS.includes(cliente)){CLIENTES_GUARDADOS.unshift(cliente);}

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  body{font-family:Arial,sans-serif;font-size:12px;color:#222;margin:0;padding:28px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0F6E56}
  .empresa{font-size:18px;font-weight:bold;color:#0F6E56;margin-bottom:4px}
  .sub{color:#666;font-size:11px;line-height:1.6}
  .ppto-title{font-size:22px;font-weight:bold;color:#0F6E56;letter-spacing:1px}
  .ppto-num{font-size:13px;color:#444;margin-top:4px}
  .cli-box{background:#f5fdf9;border-left:4px solid #0F6E56;padding:12px 16px;margin-bottom:20px;border-radius:0 8px 8px 0}
  .cli-lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
  .cli-name{font-size:16px;font-weight:bold;color:#222;margin-top:2px}
  table{width:100%;border-collapse:collapse;margin-bottom:20px}
  th{background:#0F6E56;color:#fff;padding:9px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td{padding:8px 12px;border-bottom:1px solid #eee;font-size:12px}
  tr:nth-child(even) td{background:#fafafa}
  .total-row td{font-weight:bold;background:#E1F5EE;color:#085041;font-size:14px;border-top:2px solid #0F6E56}
  .obs-box{background:#fffbea;border-left:3px solid #EF9F27;padding:10px 14px;margin-bottom:20px;border-radius:0 6px 6px 0;font-size:11px}
  .footer{text-align:center;color:#aaa;font-size:10px;margin-top:24px;padding-top:12px;border-top:1px solid #eee}
  </style></head><body>
  <div class="header">
    <div><div class="empresa">Ordeno x Vos</div>
    <div class="sub">Diego Anon<br>ordenoxvosarg@gmail.com · @ordeno_x_vos<br>Servicio y venta de productos de organización</div></div>
    <div style="text-align:right"><div class="ppto-title">PRESUPUESTO</div><div class="ppto-num">N° ${num} · ${fecha}</div></div>
  </div>
  <div class="cli-box"><div class="cli-lbl">Cliente</div><div class="cli-name">${cliente}</div></div>
  ${obs?`<div class="obs-box"><strong>Obs:</strong> ${obs}</div>`:''}
  <table><thead><tr><th>Descripción</th><th style="text-align:center;width:55px">Cant.</th><th style="text-align:right;width:110px">Precio unit.</th><th style="text-align:right;width:110px">Total</th></tr></thead>
  <tbody>${lineas.map(l=>`<tr><td>${l.desc}</td><td style="text-align:center">${l.qty}</td><td style="text-align:right">ARS ${l.price.toLocaleString('es-AR')}</td><td style="text-align:right">ARS ${l.total.toLocaleString('es-AR')}</td></tr>`).join('')}
  <tr class="total-row"><td colspan="3" style="text-align:right">TOTAL</td><td style="text-align:right">ARS ${total.toLocaleString('es-AR')}</td></tr>
  </tbody></table>
  <div class="footer">Ordeno x Vos · Presupuesto N° ${num} · Válido por 15 días</div>
  </body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`Presupuesto_${num}_${cliente.replace(/\s+/g,'_')}.html`;a.click();

  const entry={num,cliente,fecha,obs,total,items:lineas.length,lineas};
  if(editingIndex!==null){
    historial[editingIndex]=entry;
    showToast('Presupuesto N° '+num+' actualizado ✓');
    editingIndex=null;
    document.getElementById('editing-banner').style.display='none';
    document.getElementById('btn-pdf-label').textContent='Generar PDF';
    clearForm();
    await loadNum();
  } else {
    historial.unshift(entry);
    const next=parseInt(num)+1;
    document.getElementById('num-ppto').value=next;
    await saveNum(next);
    showToast('PDF generado · siguiente N° '+next);
    clearForm();
    document.getElementById('num-ppto').value=next;
  }
}

function compartirWA(){
  const cliente=document.getElementById('inp-cliente').value.trim()||'cliente';
  const num=document.getElementById('num-ppto').value;
  const lineas=getLineas();const total=calcTotal();
  if(!lineas.length){alert('Agregá al menos un ítem');return;}
  const det=lineas.map(l=>`• ${l.desc} x${l.qty}: ARS ${l.total.toLocaleString('es-AR')}`).join('\n');
  const msg=encodeURIComponent(`Hola! Te mando el presupuesto N°${num} de *Ordeno x Vos*:\n\n${det}\n\n*Total: ARS ${total.toLocaleString('es-AR')}*\n\nCualquier consulta, estoy a disposición 😊`);
  window.open('https://wa.me/?text='+msg,'_blank');
}

function renderHistorial(){
  const el=document.getElementById('historial-list');
  if(!historial.length){
    el.innerHTML=`<div class="empty"><i class="ti ti-clock-off"></i>Todavía no generaste presupuestos.</div>`;
    return;
  }
  el.innerHTML=historial.map((h,i)=>`
    <div class="hist-card">
      <div class="hist-top">
        <span class="hist-num">N° ${h.num}</span>
        <span class="hist-date">${h.fecha}</span>
      </div>
      <div class="hist-client">${h.cliente}</div>
      <div class="hist-bottom">
        <span class="hist-items">${h.items} ítem${h.items!==1?'s':''}</span>
        <div class="hist-right">
          <span class="hist-total">${fmt(h.total)}</span>
          <button class="btn-edit-hist" onclick="editPresupuesto(${i})"><i class="ti ti-pencil" aria-hidden="true"></i> Editar</button>
        </div>
      </div>
    </div>`).join('');
}

function renderCatalog(filter){
  const el=document.getElementById('items-catalog');
  const q=(filter||'').toLowerCase();
  const filtered=ITEMS.filter(i=>i.desc.toLowerCase().includes(q));
  if(!filtered.length){el.innerHTML='<div class="empty"><i class="ti ti-search-off"></i>Sin resultados.</div>';return;}
  el.innerHTML=filtered.map(i=>`
    <div class="catalog-row">
      <div style="flex:1;min-width:0">
        <input type="text" class="cat-name-input" value="${i.desc}" onchange="updateDesc('${i.cod}',this.value)">
        <span class="cat-cod">${i.cod}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        <span style="font-size:11px;color:var(--text3)">ARS</span>
        <input class="price-inp" type="number" value="${i.precio}" onchange="updatePrice('${i.cod}',this.value)">
      </div>
      <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;padding:4px;border-radius:6px;transition:color .15s" onmouseover="this.style.color='#E24B4A'" onmouseout="this.style.color='var(--text3)'" onclick="deleteItem('${i.cod}')"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');
}

function updatePrice(cod,val){const i=ITEMS.find(x=>x.cod===cod);if(i){i.precio=parseInt(val)||0;refreshItemSelects();showToast('Precio actualizado ✓');}}
function updateDesc(cod,val){const i=ITEMS.find(x=>x.cod===cod);if(i){i.desc=val.trim()||i.desc;refreshItemSelects();showToast('Descripción actualizada ✓');}}
function deleteItem(cod){if(!confirm('¿Eliminar?'))return;ITEMS=ITEMS.filter(i=>i.cod!==cod);renderCatalog('');refreshItemSelects();showToast('Ítem eliminado');}
function toggleNewItemForm(){const f=document.getElementById('new-item-form');f.style.display=f.style.display==='block'?'none':'block';}
function agregarNuevoItem(){
  const desc=document.getElementById('new-desc').value.trim();
  const precio=parseInt(document.getElementById('new-precio').value)||0;
  if(!desc){alert('Ingresá una descripción');return;}
  ITEMS.push({cod:'IT'+String(nextCod++).padStart(5,'0'),desc,precio});
  document.getElementById('new-desc').value='';document.getElementById('new-precio').value='';
  document.getElementById('new-item-form').style.display='none';
  renderCatalog('');refreshItemSelects();showToast('Ítem agregado ✓');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Arranque robusto: primero el UI, después el storage
addItem();
document.getElementById('fecha-ppto').value = new Date().toISOString().split('T')[0];
loadNum().catch(() => {
  document.getElementById('num-ppto').value = DEFAULT_NUM;
  document.getElementById('num-badge').textContent = DEFAULT_NUM;
});
</script>
